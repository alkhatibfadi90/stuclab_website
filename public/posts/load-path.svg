<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Georgia, 'Times New Roman', serif" role="img" aria-label="Building section showing the gravity load path from slab through beams, columns and footings to the soil, alongside the lateral load path through the diaphragms into the core and down to foundation.">
  <defs>
    <!-- soil hatch -->
    <pattern id="soil" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#cfc4a8" stroke-width="1.4"/>
    </pattern>
    <!-- core concrete hatch -->
    <pattern id="core" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#b9c4cc" stroke-width="1"/>
    </pattern>
    <marker id="grav" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f2a33"/>
    </marker>
    <marker id="lat" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C49A2E"/>
    </marker>
  </defs>

  <!-- ===== card background (safe on light or dark pages) ===== -->
  <rect x="4" y="4" width="792" height="552" rx="10" fill="#ffffff" stroke="#e4ddcb" stroke-width="1.5"/>
  <rect x="4" y="4" width="792" height="5" rx="2.5" fill="#C49A2E"/>

  <!-- ===== title ===== -->
  <text x="40" y="40" font-size="21" font-weight="bold" fill="#1f2a33">Load Path: Gravity and Lateral</text>
  <text x="40" y="60" font-size="13" fill="#6b7680" font-style="italic">Every force must reach the ground by a continuous route.</text>

  <!-- ===== ground / soil ===== -->
  <rect x="40" y="470" width="690" height="60" fill="url(#soil)" stroke="none"/>
  <line x1="40" y1="470" x2="730" y2="470" stroke="#8a7f63" stroke-width="2"/>

  <!-- ===== column grid lines (perimeter + interior) ===== -->
  <!-- left perimeter column -->
  <rect x="150" y="120" width="14" height="350" fill="#e7e3d8" stroke="#1f2a33" stroke-width="1.5"/>
  <!-- right perimeter column -->
  <rect x="566" y="120" width="14" height="350" fill="#e7e3d8" stroke="#1f2a33" stroke-width="1.5"/>

  <!-- ===== central core ===== -->
  <rect x="350" y="120" width="80" height="350" fill="url(#core)" stroke="#1f2a33" stroke-width="1.8"/>

  <!-- ===== floor slabs (5 levels) ===== -->
  <!-- y positions: 120,190,260,330,400 ; slab thickness 10 -->
  <g stroke="#1f2a33" stroke-width="1.5">
    <rect x="150" y="120" width="430" height="9" fill="#d8d2c4"/>
    <rect x="150" y="190" width="430" height="9" fill="#d8d2c4"/>
    <rect x="150" y="260" width="430" height="9" fill="#d8d2c4"/>
    <rect x="150" y="330" width="430" height="9" fill="#d8d2c4"/>
    <rect x="150" y="400" width="430" height="9" fill="#d8d2c4"/>
  </g>

  <!-- ===== footings (rectangular pads; core pad much wider for overturning) ===== -->
  <g fill="#e7e3d8" stroke="#1f2a33" stroke-width="1.5">
    <rect x="134" y="448" width="46" height="22"/>
    <rect x="300" y="442" width="180" height="28"/>
    <rect x="550" y="448" width="46" height="22"/>
  </g>

  <!-- ============================================================= -->
  <!-- GRAVITY PATH  (dark, solid)                                   -->
  <!-- ============================================================= -->
  <!-- applied gravity load on top slab -->
  <g stroke="#1f2a33" stroke-width="2" marker-end="url(#grav)">
    <line x1="220" y1="92" x2="220" y2="116"/>
    <line x1="280" y1="92" x2="280" y2="116"/>
    <line x1="470" y1="92" x2="470" y2="116"/>
    <line x1="510" y1="92" x2="510" y2="116"/>
  </g>
  <text x="300" y="84" font-size="12" fill="#1f2a33" text-anchor="middle" font-weight="bold">gravity load (G + Q)</text>

  <!-- slab -> column transfer arrows (down the perimeter columns) -->
  <g stroke="#1f2a33" stroke-width="2.2" marker-end="url(#grav)" opacity="0.85">
    <line x1="157" y1="205" x2="157" y2="250"/>
    <line x1="157" y1="345" x2="157" y2="390"/>
    <line x1="573" y1="205" x2="573" y2="250"/>
    <line x1="573" y1="345" x2="573" y2="390"/>
  </g>

  <!-- gravity into soil -->
  <g stroke="#1f2a33" stroke-width="2" marker-end="url(#grav)">
    <line x1="157" y1="470" x2="157" y2="500"/>
    <line x1="573" y1="470" x2="573" y2="500"/>
  </g>

  <!-- ============================================================= -->
  <!-- LATERAL PATH  (gold)                                          -->
  <!-- ============================================================= -->
  <!-- lateral forces entering at each diaphragm, left side -->
  <g stroke="#C49A2E" stroke-width="2.4" marker-end="url(#lat)">
    <line x1="92" y1="124" x2="146" y2="124"/>
    <line x1="100" y1="194" x2="146" y2="194"/>
    <line x1="108" y1="264" x2="146" y2="264"/>
    <line x1="116" y1="334" x2="146" y2="334"/>
    <line x1="124" y1="404" x2="146" y2="404"/>
  </g>
  <text x="70" y="110" font-size="12" fill="#C49A2E" font-weight="bold">wind /</text>
  <text x="70" y="125" font-size="12" fill="#C49A2E" font-weight="bold">seismic</text>

  <!-- diaphragm transfer along each slab into the core (gold arrows pointing inward) -->
  <g stroke="#C49A2E" stroke-width="2" marker-end="url(#lat)" stroke-dasharray="2 0">
    <line x1="200" y1="124" x2="344" y2="124"/>
    <line x1="200" y1="194" x2="344" y2="194"/>
    <line x1="200" y1="264" x2="344" y2="264"/>
    <line x1="200" y1="334" x2="344" y2="334"/>
    <line x1="200" y1="404" x2="344" y2="404"/>
  </g>

  <!-- lateral travelling DOWN the core -->
  <g stroke="#C49A2E" stroke-width="3" marker-end="url(#lat)">
    <line x1="390" y1="200" x2="390" y2="254"/>
    <line x1="390" y1="272" x2="390" y2="324"/>
    <line x1="390" y1="342" x2="390" y2="394"/>
    <line x1="390" y1="412" x2="390" y2="442"/>
  </g>
  <!-- lateral into foundation -->
  <line x1="390" y1="470" x2="390" y2="500" stroke="#C49A2E" stroke-width="3" marker-end="url(#lat)"/>

  <!-- diaphragm label callout -->
  <text x="275" y="118" font-size="10.5" fill="#a07e1f" font-style="italic" text-anchor="middle">diaphragm action</text>

  <!-- ===== legend ===== -->
  <g transform="translate(610,150)">
    <rect x="0" y="0" width="155" height="92" fill="#ffffff" stroke="#d8d2c4" stroke-width="1"/>
    <text x="12" y="22" font-size="12" font-weight="bold" fill="#1f2a33">Legend</text>
    <line x1="12" y1="42" x2="40" y2="42" stroke="#1f2a33" stroke-width="2.4" marker-end="url(#grav)"/>
    <text x="48" y="46" font-size="11" fill="#3a4750">gravity path</text>
    <line x1="12" y1="68" x2="40" y2="68" stroke="#C49A2E" stroke-width="2.4" marker-end="url(#lat)"/>
    <text x="48" y="72" font-size="11" fill="#3a4750">lateral path</text>
  </g>

  <!-- ===== element labels as side callouts (empty right space, below legend) ===== -->
  <g font-size="10.5" fill="#3a4750">
    <line x1="430" y1="290" x2="600" y2="290" stroke="#9aa3ab" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="605" y="287" font-weight="bold">Core / shear wall</text>
    <text x="605" y="301" fill="#6b7680">takes lateral to base</text>
    <line x1="580" y1="360" x2="600" y2="360" stroke="#9aa3ab" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="605" y="357" font-weight="bold">Perimeter columns</text>
    <text x="605" y="371" fill="#6b7680">carry gravity down</text>
  </g>

  <!-- ===== teaching callout: continuity at foundation ===== -->
  <g transform="translate(430,505)">
    <text x="0" y="0" font-size="11" fill="#6b7680" font-style="italic">The path must be continuous at every step —</text>
    <text x="0" y="15" font-size="11" fill="#6b7680" font-style="italic">a break anywhere is where the structure fails.</text>
  </g>
</svg>
