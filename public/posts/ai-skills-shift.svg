<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, 'Times New Roman', serif" role="img" aria-label="A contrast of engineering skills by their value as AI advances. Falling in value: production speed, breadth of software operated, and volume of output — the work AI is absorbing. Rising in value: framing the problem, sensing a wrong answer, deep specialism, translating model to reality, and driving the tools while keeping judgement in the loop.">
  <defs>
    <marker id="dn" markerWidth="12" markerHeight="12" refX="5" refY="9" orient="0">
      <path d="M1,1 L5,9 L9,1" fill="none" stroke="#9a917f" stroke-width="2"/>
    </marker>
    <marker id="up" markerWidth="12" markerHeight="12" refX="5" refY="3" orient="0">
      <path d="M1,9 L5,1 L9,9" fill="none" stroke="#C49A2E" stroke-width="2"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="4" y="4" width="792" height="492" rx="10" fill="#ffffff" stroke="#e4ddcb" stroke-width="1.5"/>
  <rect x="4" y="4" width="792" height="5" rx="2.5" fill="#C49A2E"/>

  <!-- title -->
  <text x="40" y="40" font-size="21" font-weight="bold" fill="#1f2a33">Which Engineering Skills Hold Their Value</text>
  <text x="40" y="60" font-size="13" fill="#6b7680" font-style="italic">As AI absorbs the routine, the value of your skills moves in two directions.</text>

  <!-- ===== LEFT : falling ===== -->
  <rect x="40" y="86" width="340" height="380" rx="8" fill="#f6f4ef" stroke="#ddd6c8" stroke-width="1.4"/>
  <text x="210" y="116" font-size="14" font-weight="bold" fill="#9a917f" text-anchor="middle" letter-spacing="0.5">FALLING IN VALUE</text>
  <text x="210" y="135" font-size="10.5" fill="#a89e8a" text-anchor="middle" font-style="italic">the work AI is absorbing</text>
  <line x1="64" y1="150" x2="356" y2="150" stroke="#e4ddcb" stroke-width="1"/>

  <g>
    <line x1="72" y1="178" x2="72" y2="198" stroke="#9a917f" stroke-width="2" marker-end="url(#dn)"/>
    <text x="92" y="184" font-size="14" fill="#7d7565">Production speed</text>
    <text x="92" y="202" font-size="10.5" fill="#a89e8a" font-style="italic">turning out calcs quickly</text>
  </g>
  <g>
    <line x1="72" y1="240" x2="72" y2="260" stroke="#9a917f" stroke-width="2" marker-end="url(#dn)"/>
    <text x="92" y="246" font-size="14" fill="#7d7565">Breadth of software operated</text>
    <text x="92" y="264" font-size="10.5" fill="#a89e8a" font-style="italic">knowing many packages shallowly</text>
  </g>
  <g>
    <line x1="72" y1="302" x2="72" y2="322" stroke="#9a917f" stroke-width="2" marker-end="url(#dn)"/>
    <text x="92" y="308" font-size="14" fill="#7d7565">Volume of output</text>
    <text x="92" y="326" font-size="10.5" fill="#a89e8a" font-style="italic">drawings and reports per hour</text>
  </g>

  <rect x="64" y="392" width="292" height="56" rx="6" fill="#efece4"/>
  <text x="210" y="414" font-size="11" fill="#8c8474" text-anchor="middle" font-style="italic">Valuable when production was the</text>
  <text x="210" y="430" font-size="11" fill="#8c8474" text-anchor="middle" font-style="italic">bottleneck. AI is removing the</text>
  <text x="210" y="446" font-size="11" fill="#8c8474" text-anchor="middle" font-style="italic">bottleneck.</text>

  <!-- ===== RIGHT : rising ===== -->
  <rect x="420" y="86" width="340" height="380" rx="8" fill="#ffffff" stroke="#C49A2E" stroke-width="2"/>
  <text x="590" y="116" font-size="14" font-weight="bold" fill="#1f2a33" text-anchor="middle" letter-spacing="0.5">RISING IN VALUE</text>
  <text x="590" y="135" font-size="10.5" fill="#a07e1f" text-anchor="middle" font-style="italic">the judgement AI can't absorb</text>
  <line x1="444" y1="150" x2="736" y2="150" stroke="#f0e6cc" stroke-width="1"/>

  <g font-size="13" fill="#1f2a33">
    <line x1="452" y1="180" x2="452" y2="166" stroke="#C49A2E" stroke-width="2" marker-end="url(#up)"/>
    <text x="472" y="178" font-weight="bold">Framing the problem</text>
    <text x="472" y="194" font-size="10.5" fill="#6b7680" font-style="italic">knowing what to model</text>

    <line x1="452" y1="232" x2="452" y2="218" stroke="#C49A2E" stroke-width="2" marker-end="url(#up)"/>
    <text x="472" y="230" font-weight="bold">Sensing a wrong answer</text>
    <text x="472" y="246" font-size="10.5" fill="#6b7680" font-style="italic">the smell for output that's off</text>

    <line x1="452" y1="284" x2="452" y2="270" stroke="#C49A2E" stroke-width="2" marker-end="url(#up)"/>
    <text x="472" y="282" font-weight="bold">Deep specialism</text>
    <text x="472" y="298" font-size="10.5" fill="#6b7680" font-style="italic">depth that's hard to fake</text>

    <line x1="452" y1="336" x2="452" y2="322" stroke="#C49A2E" stroke-width="2" marker-end="url(#up)"/>
    <text x="472" y="334" font-weight="bold">Translating model to reality</text>
    <text x="472" y="350" font-size="10.5" fill="#6b7680" font-style="italic">do the assumptions hold?</text>

    <line x1="452" y1="380" x2="452" y2="366" stroke="#C49A2E" stroke-width="2" marker-end="url(#up)"/>
    <text x="472" y="378" font-weight="bold">Driving the tools well</text>
    <text x="472" y="394" font-size="10.5" fill="#6b7680" font-style="italic">judgement kept in the loop</text>
  </g>

  <!-- footer -->
  <text x="400" y="484" font-size="11.5" fill="#6b7680" text-anchor="middle" font-style="italic">None of it can be written down as a procedure — which is exactly why no tool can absorb it.</text>
</svg>
