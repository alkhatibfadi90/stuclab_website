<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Georgia, 'Times New Roman', serif" role="img" aria-label="A row-by-row contrast of weak versus strong graduate engineers across five habits: chasing answers versus chasing the principle behind them; accepting whatever a number says versus having a feel for scale; doing the task versus owning the problem; asking weak questions versus sharp ones; and rushing the routine work versus treating it as the apprenticeship.">
  <!-- card -->
  <rect x="4" y="4" width="792" height="512" rx="10" fill="#ffffff" stroke="#e4ddcb" stroke-width="1.5"/>
  <rect x="4" y="4" width="792" height="5" rx="2.5" fill="#C49A2E"/>

  <!-- title -->
  <text x="40" y="40" font-size="21" font-weight="bold" fill="#1f2a33">Two Graduates, Two Years Later</text>
  <text x="40" y="60" font-size="13" fill="#6b7680" font-style="italic">Same degree, same grades. The gap is built from habits — and every one is a choice.</text>

  <!-- column headers -->
  <rect x="270" y="80" width="248" height="34" rx="6" fill="#f1efe9"/>
  <text x="394" y="102" font-size="13" font-weight="bold" fill="#9a917f" text-anchor="middle" letter-spacing="0.5">THE WEAK GRADUATE</text>
  <rect x="534" y="80" width="232" height="34" rx="6" fill="#fbf6e9" stroke="#C49A2E" stroke-width="1.4"/>
  <text x="650" y="102" font-size="13" font-weight="bold" fill="#1f2a33" text-anchor="middle" letter-spacing="0.5">THE STRONG GRADUATE</text>

  <!-- ============ ROWS ============ -->
  <!-- row template: label left (40-264), weak (270-518), strong (534-766) -->

  <!-- ROW 1 -->
  <text x="48" y="146" font-size="12.5" font-weight="bold" fill="#1f2a33">Learning</text>
  <text x="282" y="146" font-size="12" fill="#7d7565">Fixes the calc that was wrong</text>
  <text x="546" y="146" font-size="12" fill="#3a4750">Asks what principle they got wrong</text>
  <line x1="40" y1="162" x2="766" y2="162" stroke="#eee9dc" stroke-width="1"/>

  <!-- ROW 2 -->
  <text x="48" y="192" font-size="12.5" font-weight="bold" fill="#1f2a33">Numbers</text>
  <text x="282" y="192" font-size="12" fill="#7d7565">Accepts whatever it produces</text>
  <text x="546" y="192" font-size="12" fill="#3a4750">Has a feel for what's plausible</text>
  <line x1="40" y1="208" x2="766" y2="208" stroke="#eee9dc" stroke-width="1"/>

  <!-- ROW 3 -->
  <text x="48" y="238" font-size="12.5" font-weight="bold" fill="#1f2a33">Scope</text>
  <text x="282" y="238" font-size="12" fill="#7d7565">Does exactly the task given</text>
  <text x="546" y="238" font-size="12" fill="#3a4750">Owns the problem behind it</text>
  <line x1="40" y1="254" x2="766" y2="254" stroke="#eee9dc" stroke-width="1"/>

  <!-- ROW 4 -->
  <text x="48" y="284" font-size="12.5" font-weight="bold" fill="#1f2a33">Questions</text>
  <text x="282" y="284" font-size="12" fill="#7d7565">"How do I do this?"</text>
  <text x="546" y="284" font-size="12" fill="#3a4750">Specific, after they've thought</text>
  <line x1="40" y1="300" x2="766" y2="300" stroke="#eee9dc" stroke-width="1"/>

  <!-- ROW 5 -->
  <text x="48" y="330" font-size="12.5" font-weight="bold" fill="#1f2a33">The grind</text>
  <text x="282" y="330" font-size="12" fill="#7d7565">Resents it, rushes it</text>
  <text x="546" y="330" font-size="12" fill="#3a4750">Treats it as the apprenticeship</text>
  <line x1="40" y1="346" x2="766" y2="346" stroke="#e4ddcb" stroke-width="1.4"/>

  <!-- outcome row -->
  <text x="48" y="384" font-size="12.5" font-weight="bold" fill="#b03a2e">Result</text>
  <rect x="270" y="366" width="248" height="40" rx="6" fill="#f1efe9"/>
  <text x="394" y="391" font-size="11.5" fill="#8c8474" text-anchor="middle" font-style="italic">Stays closely checked,</text>
  <text x="394" y="405" font-size="11.5" fill="#8c8474" text-anchor="middle" font-style="italic">accumulates narrow facts</text>
  <rect x="534" y="366" width="232" height="40" rx="6" fill="#fbf6e9" stroke="#C49A2E" stroke-width="1.4"/>
  <text x="650" y="391" font-size="11.5" fill="#7a5f14" text-anchor="middle" font-style="italic">Handed real work fast,</text>
  <text x="650" y="405" font-size="11.5" fill="#7a5f14" text-anchor="middle" font-style="italic">builds a framework that compounds</text>

  <!-- bottom banner -->
  <rect x="40" y="432" width="726" height="56" rx="8" fill="#1f2a33"/>
  <text x="400" y="456" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">None of this is about being clever.</text>
  <text x="400" y="476" font-size="12" fill="#C49A2E" text-anchor="middle">The gap isn't fixed on day one — it's built, habit by habit, over two years.</text>
</svg>
